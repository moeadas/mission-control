<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 280px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .header span {
            font-size: 24px;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
            text-align: center;
        }
        .input-group input:focus {
            outline: none;
            border-color: #00f2ea;
        }
        .buttons {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        #applyBtn {
            background: linear-gradient(135deg, #00f2ea, #ff0050);
            color: white;
        }
        #applyBtn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(0, 242, 234, 0.3);
        }
        #resetBtn {
            background: rgba(255,255,255,0.1);
            color: #888;
        }
        #resetBtn:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
        }
        .status.inactive {
            background: rgba(255,255,255,0.05);
            color: #666;
        }
        .status.active {
            background: rgba(0, 242, 234, 0.1);
            color: #00f2ea;
        }
        .status.error {
            background: rgba(255, 0, 80, 0.1);
            color: #ff0050;
        }
        .info {
            margin-top: 16px;
            font-size: 11px;
            color: #555;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="header">
        <span>🎯</span>
        <h1>TikTok Cost Multiplier</h1>
    </div>
    
    <div class="input-group">
        <label>Multiplier</label>
        <input type="number" id="multiplier" value="1.5" min="0.01" step="0.1" placeholder="e.g. 1.5">
    </div>
    
    <div class="buttons">
        <button id="applyBtn">Apply</button>
        <button id="resetBtn">Reset</button>
    </div>
    
    <div id="status" class="status inactive">Inactive</div>
    
    <div class="info">
        Shows multiplied cost values in a floating panel.<br>
        Works on ads.tiktok.com campaign pages.
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
