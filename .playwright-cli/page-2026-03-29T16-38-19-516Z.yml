t a snippet 🔹 New discoveries added automatically 🔹 Health, performance, and ancestry insights 🔹 One purchase. Your horse's entire genetic story. --- **Slide 5: The Future Included** Science doesn't stand still — and neither do we. When researchers discover new genetic links, your results update. No retest. No extra cost. Just more answers. --- **Slide 6: The CTA Slide** **Unlock your horse's full genetic potential.** 👉 Link in bio to order your Victory Genomics test today. --- ## Caption Your horse's genome contains 2.8 billion base pairs of information. Most DNA tests read a few hundred. We read them all. Introducing whole genome sequencing from Victory Genomics — the most comprehensive equine genetic test available. One test. One price. Lifetime updates as new discoveries emerge. There's more to your horse than meets the eye. Let's find it together. 🐴🔬 ## CTA **Order Your Test → Link in Bio** ## Hashtag Suggestions #EquineGenomics #HorseDNA #WholeGenomeSequencing #HorseHealth #EquineScience #VictoryGenomics #HorseBreeding #EquineWellness #GeneticTesting #HorseGenetics #OneTestForLife ## Design Direction Notes - **Color Palette:** Deep navy/charcoal background with gold or teal accents — premium science meets equine warmth - **Typography:** Clean sans-serif for data; elegant serif or script accent for headlines - **Imagery:** High-quality horse portrait (close eye or face) as hero image; subtle DNA helix or genomic pattern overlay at low opacity - **Icons:** Minimal line icons for bullet points; avoid clinical imagery - **Slide Pacing:** Generous white space; never crowd text — aim for 3-second readability per slide - **Mobile-First:** All text must be legible at 4\"–6\" screen size without zooming"
